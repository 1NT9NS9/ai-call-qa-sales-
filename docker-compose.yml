services:
  app-api:
    build:
      context: .
      dockerfile: apps/app-api/Dockerfile
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./apps/app-api/src:/app/src
      - ./storage/audio:/app/storage/audio
    depends_on:
      db:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-app_db}
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  db-bootstrap:
    image: pgvector/pgvector:pg16
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    command:
      - /bin/sh
      - -c
      - |
        export PGPASSWORD="${POSTGRES_PASSWORD}"
        psql -h db -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS vector"
        psql -h db -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -tAc "SELECT extname FROM pg_extension WHERE extname = 'vector'" | grep -qx vector

volumes:
  pgdata:
